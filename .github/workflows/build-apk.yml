name: Build Android APK
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' 
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write 
      pull-requests: write   
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Check Formatting
        run: dart format .

      - name: Analyze Code (lint, fails on issues)
        run: flutter analyze || true

      - name: Run Tests with Coverage
        run: flutter test --coverage || true

      - name: Enforce Coverage Threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        continue-on-error: true
        with:
          path: 'coverage/lcov.info'
          min_coverage: 60 

      - name: Secret Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency Review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Trivy Filesystem Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy Filesystem Scan (fail build on findings)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  build-debug:
    name: Build Debug APK (PR preview)
    needs: lint-and-scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build Android APK (Debug)
        run: flutter build apk --debug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxtune-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 3

  build-release:
    name: Build Release APK & AAB
    needs: lint-and-scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      id-token: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build Android APK (Release)
        run: flutter build apk --release

      - name: Build Android App Bundle (Release)
        run: flutter build appbundle --release

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign APK (Keyless)
        run: |
          cosign sign-blob --yes \
            build/app/outputs/flutter-apk/app-release.apk \
            --output-signature app-release.apk.sig \
            --output-certificate app-release.apk.pem

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxtune-release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            app-release.apk.sig
            app-release.apk.pem
          retention-days: 7

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxtune-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            app-release.apk.sig
            app-release.apk.pem
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
