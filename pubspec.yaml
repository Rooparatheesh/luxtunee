name: luxtunee
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  go_router: ^17.2.3
  palette_generator: ^0.3.3+7
  http: ^1.2.0
  on_audio_query: ^2.9.0
  crypto: ^3.0.7
  encrypt: ^5.0.3
  shared_preferences: ^2.5.5
  uuid: ^4.3.3
  archive: ^3.4.9
  youtube_explode_dart: ^3.1.0
  marquee: ^2.3.0
  device_info_plus: ^12.4.0
  firebase_core: ^4.11.0
  firebase_database: ^12.4.3
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  metadata_god: ^1.1.0
  dart_tags: ^0.4.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/yesu.jpg
    - assets/images/sithrs.jpg
    - assets/images/ks.jpg